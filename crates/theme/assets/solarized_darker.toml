name = "solarized_darker"

# A higher-contrast variant of Solarized Dark: pure-black background plus
# the canonical accent ramp. Same accent palette as `solarized_dark`; only
# the background / panel / chrome surfaces are darkened.

[colors]
"window.background"                 = "#001017"
"window.foreground"                 = "#93a1a1"

"panel.background"                  = "#001b22"
"panel.foreground"                  = "#93a1a1"
"panel.active_tab.background"       = "#002b36"
"panel.active_tab.foreground"       = "#fdf6e3"
"panel.inactive_tab.background"     = "#001017"
"panel.inactive_tab.foreground"     = "#586e75"

"pane.border"                       = "#001b22"
"pane.border_active"                = "#8a4530"

"editor.background"                 = "#001017"
"editor.foreground"                 = "#93a1a1"
"editor.cursor.primary"             = "#cb4b16"
"editor.cursor.secondary"           = "#268bd2"
"editor.selection"                  = "#002b36cc"
"editor.selection_inactive"         = "#002b3680"
"editor.line_highlight"             = "#001b22"
"editor.caret_line_highlight"       = "#003040"
"editor.line_number"                = "#586e75"
"editor.line_number_active"         = "#93a1a1"
"editor.indent_guide"               = "#16323c"
"editor.indent_guide_active"        = "#586e75"
"editor.search_match"               = "#b5890090"
"editor.search_match_active"        = "#b58900c8"
"editor.find_bar.background"        = "#001b22"
