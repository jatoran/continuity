name = "catppuccin_latte"

# Catppuccin Latte — the only light Catppuccin flavor. Base #eff1f5,
# warmer + softer than `paper`, with the full Catppuccin accent ramp
# tuned for light backgrounds. Canonical palette from
# https://github.com/catppuccin/catppuccin.

[colors]
"window.background"                 = "#eff1f5"
"window.foreground"                 = "#4c4f69"

"panel.background"                  = "#e6e9ef"
"panel.foreground"                  = "#5c5f77"
"panel.active_tab.background"       = "#eff1f5"
"panel.active_tab.foreground"       = "#4c4f69"
"panel.inactive_tab.background"     = "#e6e9ef"
"panel.inactive_tab.foreground"     = "#9ca0b0"

"pane.border"                       = "#ccd0da"
"pane.border_active"                = "#8839ef"

"editor.background"                 = "#eff1f5"
