[[binding]]
keys = ["ctrl+alt+t"]
command = "buffer.timeline"

# §I2 metrics buffer (WPM + activity heatmap)
[[binding]]
keys = ["ctrl+alt+m"]
command = "view.metrics"

# Cell-scoped overrides inside a pipe-table cell. The keymap is
# last-match-wins among bindings whose `when` predicate is true, so
# these supersede the global Ctrl+A / Home / End / Shift+Home /
# Shift+End bindings whenever the primary caret sits inside a table
# block. The handlers return `UnsupportedContext` when no caret is
# actually inside a cell (e.g. caret on a pipe boundary), which lets
# higher layers re-dispatch the global binding.
[[binding]]
keys = ["ctrl+a"]
command = "markdown.table.select_cell"
when = "editor.in_table"

[[binding]]
keys = ["home"]
command = "markdown.table.caret_cell_start"
when = "editor.in_table"

[[binding]]
keys = ["end"]
command = "markdown.table.caret_cell_end"
when = "editor.in_table"

[[binding]]
keys = ["shift+home"]
command = "markdown.table.extend_cell_start"
when = "editor.in_table"

[[binding]]
keys = ["shift+end"]
command = "markdown.table.extend_cell_end"
when = "editor.in_table"

# Phase C — cell-aware navigation. Tab/Shift+Tab walk cells in source
# order; at the last cell, Tab inserts a new body row. Enter moves to
# the cell directly below (skipping the alignment row); at the last
# body row, inserts a new row. Ctrl+Enter inserts a literal `<br>` for
# the caret to continue writing past (visual line break inside a cell
# arrives with Phase F). Up/Down cross cell boundaries (same column);
# at the table's top/bottom row they return `UnsupportedContext` so the
# keymap layer falls through to the global motion.
[[binding]]
keys = ["tab"]
command = "markdown.table.tab_next"
when = "editor.in_table"

[[binding]]
keys = ["shift+tab"]
command = "markdown.table.tab_prev"
when = "editor.in_table"

[[binding]]
keys = ["enter"]
command = "markdown.table.enter"
when = "editor.in_table"

[[binding]]
keys = ["ctrl+enter"]
command = "markdown.table.insert_break"
when = "editor.in_table"

# Shift+Enter moves UP a cell (inverse of Enter). At the header row it
# stays put — it never exits the table or inserts a raw newline that
# would split the table.
[[binding]]
keys = ["shift+enter"]
command = "markdown.table.cell_up"
when = "editor.in_table"

[[binding]]
keys = ["up"]
command = "markdown.table.move_up"
when = "editor.in_table"

[[binding]]
keys = ["down"]
command = "markdown.table.move_down"
when = "editor.in_table"
