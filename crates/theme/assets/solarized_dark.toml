name = "solarized_dark"

# Canonical Ethan Schoonover Solarized palette
# (https://ethanschoonover.com/solarized/). base03 background, base0
# foreground, accent ramp yellow/orange/red/magenta/violet/blue/cyan/green.

[colors]
"window.background"                 = "#002b36"
"window.foreground"                 = "#839496"

"panel.background"                  = "#073642"
"panel.foreground"                  = "#93a1a1"
"panel.active_tab.background"       = "#002b36"
"panel.active_tab.foreground"       = "#eee8d5"
"panel.inactive_tab.background"     = "#073642"
"panel.inactive_tab.foreground"     = "#586e75"

"pane.border"                       = "#073642"
"pane.border_active"                = "#8a4530"

"editor.background"                 = "#002b36"
"editor.foreground"                 = "#839496"
"editor.cursor.primary"             = "#cb4b16"
"editor.cursor.secondary"           = "#268bd2"
"editor.selection"                  = "#073642cc"
"editor.selection_inactive"         = "#07364280"
"editor.line_highlight"             = "#073642"
"editor.line_number"                = "#586e75"
"editor.line_number_active"         = "#93a1a1"
"editor.indent_guide"               = "#1d4250"
"editor.indent_guide_active"        = "#586e75"
"editor.search_match"               = "#b5890088"
