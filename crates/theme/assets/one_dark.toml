name = "one_dark"

# One Dark — Atom-origin palette, the most familiar dark theme in
# the VS Code ecosystem (12M+ installs as One Dark Pro). Base #282c34,
# foreground #abb2bf, accents red/orange/yellow/green/cyan/blue/purple.

[colors]
"window.background"                 = "#282c34"
"window.foreground"                 = "#abb2bf"

"panel.background"                  = "#21252b"
"panel.foreground"                  = "#abb2bf"
"panel.active_tab.background"       = "#282c34"
"panel.active_tab.foreground"       = "#dcdfe4"
"panel.inactive_tab.background"     = "#21252b"
"panel.inactive_tab.foreground"     = "#5c6370"

"pane.border"                       = "#181a1f"
"pane.border_active"                = "#61afef"

"editor.background"                 = "#282c34"
"editor.foreground"                 = "#abb2bf"
"editor.cursor.primary"             = "#528bff"
"editor.cursor.secondary"           = "#98c379"
"editor.selection"                  = "#3e4451cc"
"editor.selection_inactive"         = "#3e445180"
"editor.line_highlight"             = "#2c313c"
"editor.line_number"                = "#495162"
"editor.line_number_active"         = "#abb2bf"
"editor.indent_guide"               = "#2c313c"
"editor.indent_guide_active"        = "#495162"
"editor.search_match"               = "#e5c07b80"
"editor.search_match_active"        = "#e5c07bc0"
"editor.find_bar.background"        = "#21252b"
"editor.search_minimap.background"  = "#21252bc0"
"editor.search_minimap.match"       = "#e5c07bb0"
"editor.search_minimap.match_active" = "#d19a66ff"
"editor.minimap.background"          = "#21252bc0"
"editor.minimap.foreground"          = "#abb2bfaa"
"editor.minimap.viewport_indicator"  = "#abb2bf26"
"editor.loading_overlay.background"  = "#21252be0"
"editor.loading_overlay.foreground"  = "#abb2bf"
"editor.loading_overlay.border"      = "#3e4451"
"editor.caret_jump_glow"            = "#e5c07b60"
"editor.edit_pulse"                 = "#61afef30"
"editor.pair_rainbow.0"             = "#e06c75"
"editor.pair_rainbow.1"             = "#d19a66"
"editor.pair_rainbow.2"             = "#e5c07b"
