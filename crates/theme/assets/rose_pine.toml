name = "rose_pine"

# Canonical Rose Pine palette (https://rosepinetheme.com): base #191724,
# six-accent ramp love/gold/rose/pine/foam/iris, three-level highlight
# scale (low/med/high). "All natural pine, faux fur and a bit of soho vibes."

