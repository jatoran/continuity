name = "tokyo_night"

# Tokyo Night (storm variant) — deep indigo background with neon
# accents inspired by downtown Tokyo at night. Base #1a1b26, accents
# red/orange/yellow/green/cyan/blue/purple. Palette from
# https://github.com/enkia/tokyo-night-vscode-theme.

[colors]
"window.background"                 = "#1a1b26"
"window.foreground"                 = "#c0caf5"

"panel.background"                  = "#16161e"
"panel.foreground"                  = "#a9b1d6"
"panel.active_tab.background"       = "#20212e"
"panel.active_tab.foreground"       = "#c0caf5"
"panel.inactive_tab.background"     = "#101016"
"panel.inactive_tab.foreground"     = "#565f89"

"pane.border"                       = "#292e42"
"pane.border_active"                = "#bb9af7"

"editor.background"                 = "#1a1b26"
"editor.foreground"                 = "#c0caf5"
"editor.cursor.primary"             = "#c0caf5"
"editor.cursor.secondary"           = "#7dcfff"
"editor.selection"                  = "#bb9af755"
"editor.selection_inactive"         = "#bb9af733"
"editor.line_highlight"             = "#292e42"
"editor.caret_line_highlight"       = "#2e344a"
"editor.line_number"                = "#565f89"
"editor.line_number_active"         = "#a9b1d6"
"editor.indent_guide"               = "#292e42"
