[graph]
all-features = false

[advisories]
yanked = "warn"

[bans]
multiple-versions = "warn"
wildcards         = "warn"
deny = [
    { name = "tokio" },
    { name = "async-std" },
    { name = "smol" },
    { name = "reqwest" },
    { name = "hyper" },
    { name = "serde_yaml" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "LicenseRef-Proprietary",
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
