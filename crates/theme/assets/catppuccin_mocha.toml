name = "catppuccin_mocha"

# Catppuccin Mocha — the darkest of the four official Catppuccin flavors.
# Base #1e1e2e, soothing pastel ramp (rosewater/flamingo/pink/mauve/red/
# maroon/peach/yellow/green/teal/sky/sapphire/blue/lavender). Canonical
# palette from https://github.com/catppuccin/catppuccin.

[colors]
"window.background"                 = "#1e1e2e"
"window.foreground"                 = "#cdd6f4"

"panel.background"                  = "#181825"
"panel.foreground"                  = "#bac2de"
"panel.active_tab.background"       = "#1e1e2e"
"panel.active_tab.foreground"       = "#cdd6f4"
"panel.inactive_tab.background"     = "#181825"
"panel.inactive_tab.foreground"     = "#6c7086"

"pane.border"                       = "#313244"
"pane.border_active"                = "#cba6f7"

"editor.background"                 = "#1e1e2e"
"editor.foreground"                 = "#cdd6f4"
"editor.cursor.primary"             = "#f5e0dc"
"editor.cursor.secondary"           = "#89dceb"
"editor.selection"                  = "#585b70cc"
"editor.selection_inactive"         = "#585b7080"
"editor.line_highlight"             = "#313244"
"editor.line_number"                = "#6c7086"
