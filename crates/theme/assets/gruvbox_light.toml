name = "gruvbox_light"

# Gruvbox Light (hard variant) — light counterpart to Gruvbox Dark.
# Warm parchment background #f9f5d7, dark fg #3c3836, same six earthy
# accents tuned for light backgrounds. Canonical palette from
# https://github.com/morhetz/gruvbox.

[colors]
"window.background"                 = "#f9f5d7"
"window.foreground"                 = "#3c3836"

"panel.background"                  = "#fbf1c7"
"panel.foreground"                  = "#504945"
"panel.active_tab.background"       = "#f9f5d7"
"panel.active_tab.foreground"       = "#282828"
"panel.inactive_tab.background"     = "#ebdbb2"
"panel.inactive_tab.foreground"     = "#928374"

"pane.border"                       = "#ebdbb2"
