name = "solarized_light"

# Canonical Ethan Schoonover Solarized light palette: base3 background,
# base00 foreground, same accent ramp as the dark variant.

[colors]
"window.background"                 = "#fdf6e3"
"window.foreground"                 = "#657b83"

"panel.background"                  = "#eee8d5"
"panel.foreground"                  = "#586e75"
"panel.active_tab.background"       = "#fdf6e3"
"panel.active_tab.foreground"       = "#073642"
"panel.inactive_tab.background"     = "#eee8d5"
"panel.inactive_tab.foreground"     = "#93a1a1"

"pane.border"                       = "#eee8d5"
"pane.border_active"                = "#a85a38"

"editor.background"                 = "#fdf6e3"
"editor.foreground"                 = "#657b83"
"editor.cursor.primary"             = "#cb4b16"
"editor.cursor.secondary"           = "#268bd2"
"editor.selection"                  = "#eee8d5cc"
"editor.selection_inactive"         = "#eee8d580"
"editor.line_highlight"             = "#eee8d5"
"editor.line_number"                = "#93a1a1"
"editor.line_number_active"         = "#586e75"
"editor.indent_guide"               = "#d4ccb6"
