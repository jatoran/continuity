"editor.cursor.primary"             = "#dc8a78"
"editor.cursor.secondary"           = "#04a5e5"
"editor.selection"                  = "#acb0be99"
"editor.selection_inactive"         = "#acb0be4d"
"editor.line_highlight"             = "#dce0e8"
"editor.line_number"                = "#9ca0b0"
