name = "monokai"

# Classic Sublime Text Monokai palette: warm dark background (#272822),
# off-white foreground, six-accent ramp (pink/orange/yellow/green/cyan/purple).
# Mirrors `Monokai.sublime-color-scheme` shipped by Sublime Text.

[colors]
"window.background"                 = "#272822"
"window.foreground"                 = "#f8f8f2"

"panel.background"                  = "#1e1f1c"
"panel.foreground"                  = "#cfd0c2"
"panel.active_tab.background"       = "#272822"
"panel.active_tab.foreground"       = "#f8f8f2"
"panel.inactive_tab.background"     = "#1e1f1c"
"panel.inactive_tab.foreground"     = "#75715e"

"pane.border"                       = "#1e1f1c"
"pane.border_active"                = "#fd971f"

"editor.background"                 = "#272822"
"editor.foreground"                 = "#f8f8f2"
"editor.cursor.primary"             = "#f8f8f0"
"editor.cursor.secondary"           = "#a6e22e"
"editor.selection"                  = "#49483ecc"
"editor.selection_inactive"         = "#49483e80"
"editor.line_highlight"             = "#3e3d32"
"editor.line_number"                = "#75715e"
"editor.line_number_active"         = "#cfd0c2"
"editor.indent_guide"               = "#3b3a32"
"editor.indent_guide_active"        = "#75715e"
"editor.search_match"               = "#e6db7488"
"editor.search_match_active"        = "#e6db74c0"
"editor.find_bar.background"        = "#1e1f1c"
"editor.search_minimap.background"  = "#1e1f1cc0"
"editor.search_minimap.match"       = "#e6db74b0"
"editor.search_minimap.match_active" = "#fd971fff"
"editor.minimap.background"          = "#1e1f1cc0"
"editor.minimap.foreground"          = "#cfd0c2aa"
"editor.minimap.viewport_indicator"  = "#f8f8f226"
"editor.loading_overlay.background"  = "#1e1f1ce0"
"editor.loading_overlay.foreground"  = "#cfd0c2"
"editor.loading_overlay.border"      = "#3b3a32"
"editor.caret_jump_glow"            = "#e6db7460"
"editor.edit_pulse"                 = "#66d9ef30"
"editor.pair_rainbow.0"             = "#f92672"
"editor.pair_rainbow.1"             = "#fd971f"
"editor.pair_rainbow.2"             = "#e6db74"
"editor.pair_rainbow.3"             = "#a6e22e"
"editor.pair_rainbow.4"             = "#66d9ef"
"editor.pair_rainbow.5"             = "#ae81ff"
"editor.soft_wrap_indicator"        = "#75715e"
"editor.breadcrumb.foreground"      = "#cfd0c2"
"editor.breadcrumb.separator"       = "#75715e"
"editor.breadcrumb.active"          = "#f8f8f2"
"editor.outline.background"         = "#1e1f1c"
"editor.outline.foreground"         = "#cfd0c2"
"editor.outline.foreground_active"  = "#e6db74"
"editor.outline.separator"          = "#75715e"
"editor.inline_highlight.foreground" = "#272822"
"editor.inline_highlight.background" = "#e6db7480"
"editor.focus_dim_alpha"             = "#00000073"
"editor.foreground_dim"              = "#75715e"

"markdown.heading.1"                = "#f92672"
"markdown.heading.2"                = "#fd971f"
"markdown.heading.3"                = "#e6db74"
"markdown.heading.4"                = "#a6e22e"
"markdown.heading.5"                = "#66d9ef"
"markdown.heading.6"                = "#ae81ff"
"markdown.bold"                     = "#f8f8f2"
"markdown.italic"                   = "#cfd0c2"
"markdown.strikethrough"            = "#75715e"
"markdown.code.foreground"          = "#e6db74"
"markdown.code.background"          = "#1e1f1c"
"markdown.code_block.background"    = "#1e1f1c"
"markdown.code_block.border"        = "#3b3a32"
"markdown.blockquote.foreground"    = "#cfd0c2"
"markdown.blockquote.bar"           = "#75715e"
"markdown.link"                     = "#66d9ef"
"markdown.footnote"                 = "#66d9ef"
"markdown.url"                      = "#ae81ff"
"markdown.image_alt"                = "#cfd0c2"
"markdown.list_marker"              = "#fd971f"
"markdown.checkbox.checked"         = "#a6e22e"
"markdown.checkbox.unchecked"       = "#75715e"
"markdown.hr"                       = "#75715e"
"markdown.table.border"             = "#75715e"
"markdown.table.header_bg"          = "#1e1f1c"
"markdown.table.alignment_bg"       = "#2d2e26"
"markdown.table.active_cell_outline" = "#f8f8f0"
