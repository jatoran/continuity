name = "gruvbox_dark"

# Gruvbox Dark (hard variant) — Pavel Pertsev's retro-warm palette
# beloved in the vim community. Base #1d2021, fg #ebdbb2, six earthy
# accents (red/green/yellow/blue/purple/aqua/orange). Canonical
# palette from https://github.com/morhetz/gruvbox.

[colors]
"window.background"                 = "#1d2021"
"window.foreground"                 = "#ebdbb2"

"panel.background"                  = "#282828"
"panel.foreground"                  = "#d5c4a1"
"panel.active_tab.background"       = "#1d2021"
"panel.active_tab.foreground"       = "#fbf1c7"
"panel.inactive_tab.background"     = "#32302f"
"panel.inactive_tab.foreground"     = "#928374"

"pane.border"                       = "#3c3836"
"pane.border_active"                = "#fe8019"

"editor.background"                 = "#1d2021"
"editor.foreground"                 = "#ebdbb2"
"editor.cursor.primary"             = "#fe8019"
"editor.cursor.secondary"           = "#83a598"
"editor.selection"                  = "#d3869b55"
"editor.selection_inactive"         = "#d3869b33"
"editor.line_highlight"             = "#282828"
"editor.caret_line_highlight"       = "#34312f"
"editor.line_number"                = "#665c54"
"editor.line_number_active"         = "#d5c4a1"
"editor.indent_guide"               = "#3c3836"
"editor.indent_guide_active"        = "#665c54"
"editor.search_match"               = "#fabd2f80"
"editor.search_match_active"        = "#fabd2fc0"
"editor.find_bar.background"        = "#282828"
"editor.search_minimap.background"  = "#282828c0"
